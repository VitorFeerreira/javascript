<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analisador de Números</title>
    <link rel="stylesheet" href="estilo.css" />
  </head>
  <body>
    <header><h1>Analisador de Números</h1></header>
    <section>
      <div>
        <p>
          Número (entre 1 e 100): <input type="number" id="txtnumero" />
          <input type="button" value="Adicionar" onclick="valor()" />
        </p>
      </div>
      <div>
        <select name="tabela" id="seltab" size="10">
          <option>Digite um número</option>
        </select>
        <p><input type="button" value="Finalizar" onclick="finalizar()" /></p>
      </div>
    </section>
    <footer>
      <p>&copy; CursoemVideo</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
