<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu primeiro programa...</title>
    <style>
      body {
        font: normal 25pt Arial;
        background-color: rgb(105, 105, 173);
        color: white;
        /*I e um comentario em CSS*/
      }
      h1 {
        color: rgb(190, 171, 61);
      }
    </style>
  </head>
  <body>
    <h1>Olá, mundo!</h1>
    <!----Isso e um comentario em HTML-->>
    <p>Já me livrei da maldição</p>
    <script>
      var nome = window.prompt("Qual é o seu nome?");
      //comando para exibir uma caixa de diálogo que solicita ao usuário que insira um valor
      window.alert("Olá, " + nome + "! Seja bem-vindo ao mundo do JavaScript!");
      //O sinal de + é usado para concatenar (juntar) a string "Olá, " com o valor da variável nome e a string
      // "! Seja bem-vindo ao mundo do JavaScript!" para criar uma mensagem personalizada que é exibida em uma caixa de alerta para o usuário.
    </script>
  </body>
</html>
