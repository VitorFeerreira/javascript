<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu primeiro programa...</title>
    <style>
      body {
        font: normal 25pt Arial;
        background-color: rgb(105, 105, 173);
        color: white;
      }
      h1 {
        color: rgb(190, 171, 61);
      }
    </style>
  </head>
  <body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição</p>
    <script>
      window.alert("Minha primeira mensagem!");
      //comando para exibir uma caixa de diálogo com uma mensagem
      window.confirm("Está gostando de aprender JavaScript?");
      //comando para exibir uma caixa de diálogo com uma mensagem e opções de confirmação
      window.prompt("Qual é o seu nome?");
      //comando para exibir uma caixa de diálogo que solicita ao usuário que insira um valor
    </script>
  </body>
</html>
